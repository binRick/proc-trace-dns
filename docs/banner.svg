<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060910"/>
      <stop offset="100%" style="stop-color:#0d1420"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#67e8f9"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#06b6d4" stroke-width="1">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="220"/>
    <line x1="200" y1="0" x2="200" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/>
    <line x1="400" y1="0" x2="400" y2="220"/>
    <line x1="500" y1="0" x2="500" y2="220"/>
    <line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="700" y1="0" x2="700" y2="220"/>
    <line x1="800" y1="0" x2="800" y2="220"/>
  </g>

  <!-- Glow orb behind title -->
  <ellipse cx="450" cy="110" rx="320" ry="80" fill="#06b6d4" opacity="0.04" filter="url(#softglow)"/>

  <!-- DNS packet dots - decorative -->
  <g filter="url(#glow)">
    <circle cx="60" cy="55" r="3" fill="#06b6d4" opacity="0.7"/>
    <circle cx="80" cy="75" r="2" fill="#06b6d4" opacity="0.5"/>
    <circle cx="50" cy="90" r="2" fill="#a78bfa" opacity="0.6"/>
    <circle cx="830" cy="140" r="3" fill="#06b6d4" opacity="0.7"/>
    <circle cx="855" cy="120" r="2" fill="#06b6d4" opacity="0.5"/>
    <circle cx="845" cy="160" r="2" fill="#a78bfa" opacity="0.6"/>
  </g>

  <!-- Decorative left bracket -->
  <text x="38" y="130" font-family="'Courier New', monospace" font-size="72" fill="#06b6d4" opacity="0.15" font-weight="bold">{</text>
  <!-- Decorative right bracket -->
  <text x="820" y="130" font-family="'Courier New', monospace" font-size="72" fill="#06b6d4" opacity="0.15" font-weight="bold">}</text>

  <!-- Main title -->
  <text x="450" y="108" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="52" font-weight="bold"
        fill="url(#title)" filter="url(#glow)" letter-spacing="-1">proc-trace-dns</text>

  <!-- Subtitle -->
  <text x="450" y="148" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="15"
        fill="#5a6070" letter-spacing="3">WATCH EVERY DNS QUERY YOUR PROCESSES MAKE</text>

  <!-- Badge row -->
  <!-- Linux badge -->
  <rect x="238" y="168" width="72" height="22" rx="4" fill="#1f2937"/>
  <text x="274" y="183" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#9ca3af">🐧 Linux</text>

  <!-- Go badge -->
  <rect x="320" y="168" width="64" height="22" rx="4" fill="#1f2937"/>
  <text x="352" y="183" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#00ADD8">Go 1.22+</text>

  <!-- Zero deps badge -->
  <rect x="394" y="168" width="78" height="22" rx="4" fill="#1f2937"/>
  <text x="433" y="183" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#4ade80">zero deps</text>

  <!-- CAP_NET_RAW badge -->
  <rect x="482" y="168" width="90" height="22" rx="4" fill="#1f2937"/>
  <text x="527" y="183" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#f59e0b">CAP_NET_RAW</text>

  <!-- MIT badge -->
  <rect x="582" y="168" width="52" height="22" rx="4" fill="#1f2937"/>
  <text x="608" y="183" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a78bfa">MIT</text>

  <!-- Border -->
  <rect width="900" height="220" fill="none" stroke="#1f2937" stroke-width="1" rx="12"/>

  <!-- Top accent line -->
  <line x1="12" y1="1" x2="888" y2="1" stroke="url(#title)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
</svg>
