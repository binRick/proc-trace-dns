<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" width="780" height="380">
  <defs>
    <linearGradient id="winbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0a0d14"/>
    </linearGradient>
    <style>
      .mono { font-family: 'Courier New', Courier, monospace; }
      .prompt { fill: #a78bfa; }
      .cmd    { fill: #06b6d4; }
      .sudo   { fill: #fbbf24; }
      .pid    { fill: #fbbf24; }
      .pname  { fill: #67e8f9; }
      .qtype  { fill: #a78bfa; }
      .host   { fill: #4ade80; }
      .ip     { fill: #38bdf8; }
      .err    { fill: #f87171; }
      .dim    { fill: #4b5563; }
      .muted  { fill: #6b7280; }
      .white  { fill: #f1f5f9; }
      .label  { fill: #374151; font-size: 10px; }
    </style>
  </defs>

  <!-- Window shadow -->
  <rect x="6" y="8" width="768" height="366" rx="12" fill="#000" opacity="0.4"/>

  <!-- Window body -->
  <rect x="2" y="2" width="768" height="366" rx="10" fill="url(#winbg)" stroke="#1f2937" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="2" y="2" width="768" height="36" rx="10" fill="#111827"/>
  <rect x="2" y="28" width="768" height="10" fill="#111827"/>
  <rect x="2" y="32" width="768" height="6" fill="#111827"/>

  <!-- Traffic light buttons -->
  <circle cx="24" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="20" r="6" fill="#febc2e"/>
  <circle cx="64" cy="20" r="6" fill="#28c840"/>

  <!-- Window title -->
  <text x="384" y="25" text-anchor="middle" class="mono muted" font-size="11" letter-spacing="1">proc-trace-dns — bash</text>

  <!-- Separator -->
  <line x1="2" y1="38" x2="768" y2="38" stroke="#1f2937" stroke-width="1"/>

  <!-- Content area -->
  <rect x="2" y="38" width="768" height="330" fill="#060910" rx="0"/>
  <rect x="2" y="356" width="768" height="12" fill="#060910" rx="0"/>
  <rect x="2" y="355" width="768" height="14" rx="10" fill="#060910"/>
  <!-- Round bottom corners -->

  <!-- Command line -->
  <text x="20" y="68" class="mono" font-size="13">
    <tspan class="prompt">$ </tspan>
    <tspan class="sudo">sudo </tspan>
    <tspan class="cmd">proc-trace-dns</tspan>
    <tspan class="dim"> -c</tspan>
  </text>

  <!-- Column headers (dim) -->
  <text x="20" y="92" class="mono muted" font-size="11" letter-spacing="0.5">PID      PROCESS          TYPE   QUERY                                    ANSWER            LAT</text>
  <line x1="20" y1="97" x2="740" y2="97" stroke="#1f2937" stroke-width="1"/>

  <!-- Row 1: curl A -->
  <text x="20" y="116" class="mono" font-size="12.5">
    <tspan class="pid">12341  </tspan>
    <tspan class="pname">curl            </tspan>
    <tspan class="qtype">A      </tspan>
    <tspan class="host">api.github.com                           </tspan>
    <tspan class="dim">→ </tspan>
    <tspan class="ip">140.82.121.6</tspan>
    <tspan class="dim">      1.4ms</tspan>
  </text>

  <!-- Row 2: python3 A -->
  <text x="20" y="136" class="mono" font-size="12.5">
    <tspan class="pid">12342  </tspan>
    <tspan class="pname">python3         </tspan>
    <tspan class="qtype">A      </tspan>
    <tspan class="host">api.openai.com                           </tspan>
    <tspan class="dim">→ </tspan>
    <tspan class="ip">104.18.7.192</tspan>
    <tspan class="dim">      2.1ms</tspan>
  </text>

  <!-- Row 3: python3 AAAA -->
  <text x="20" y="156" class="mono" font-size="12.5">
    <tspan class="pid">12342  </tspan>
    <tspan class="pname">python3         </tspan>
    <tspan class="qtype">AAAA   </tspan>
    <tspan class="host">api.openai.com                           </tspan>
    <tspan class="dim">→ </tspan>
    <tspan class="ip">2606:4700::6812:7c0</tspan>
    <tspan class="dim"> 2.1ms</tspan>
  </text>

  <!-- Row 4: node A -->
  <text x="20" y="176" class="mono" font-size="12.5">
    <tspan class="pid">12343  </tspan>
    <tspan class="pname">node            </tspan>
    <tspan class="qtype">A      </tspan>
    <tspan class="host">registry.npmjs.org                       </tspan>
    <tspan class="dim">→ </tspan>
    <tspan class="ip">104.16.0.35</tspan>
    <tspan class="dim">       1.7ms</tspan>
  </text>

  <!-- Row 5: wget A -->
  <text x="20" y="196" class="mono" font-size="12.5">
    <tspan class="pid">12344  </tspan>
    <tspan class="pname">wget            </tspan>
    <tspan class="qtype">A      </tspan>
    <tspan class="host">releases.ubuntu.com                      </tspan>
    <tspan class="dim">→ </tspan>
    <tspan class="ip">185.125.190.36</tspan>
    <tspan class="dim">    0.9ms</tspan>
  </text>

  <!-- Row 6: apt A NXDOMAIN (highlighted row) -->
  <rect x="10" y="202" width="750" height="22" fill="#f87171" opacity="0.05" rx="3"/>
  <text x="20" y="216" class="mono" font-size="12.5">
    <tspan class="pid">12345  </tspan>
    <tspan class="pname">apt             </tspan>
    <tspan class="qtype">A      </tspan>
    <tspan class="host">deb.debian.org                           </tspan>
    <tspan class="dim">→ </tspan>
    <tspan class="err">NXDOMAIN</tspan>
    <tspan class="dim">          0.5ms</tspan>
  </text>

  <!-- Row 7: java A -->
  <text x="20" y="236" class="mono" font-size="12.5">
    <tspan class="pid">12346  </tspan>
    <tspan class="pname">java            </tspan>
    <tspan class="qtype">A      </tspan>
    <tspan class="host">repo1.maven.org                          </tspan>
    <tspan class="dim">→ </tspan>
    <tspan class="ip">151.101.88.215</tspan>
    <tspan class="dim">    3.2ms</tspan>
  </text>

  <!-- Row 8: systemd-resolved MX -->
  <text x="20" y="256" class="mono" font-size="12.5">
    <tspan class="pid">12347  </tspan>
    <tspan class="pname">curl            </tspan>
    <tspan class="qtype">AAAA   </tspan>
    <tspan class="host">hooks.slack.com                          </tspan>
    <tspan class="dim">→ </tspan>
    <tspan class="ip">2a01:4f8::1</tspan>
    <tspan class="dim">       1.1ms</tspan>
  </text>

  <!-- Row 9: docker TXT -->
  <text x="20" y="276" class="mono" font-size="12.5">
    <tspan class="pid">12348  </tspan>
    <tspan class="pname">docker          </tspan>
    <tspan class="qtype">A      </tspan>
    <tspan class="host">registry-1.docker.io                     </tspan>
    <tspan class="dim">→ </tspan>
    <tspan class="ip">34.226.13.51</tspan>
    <tspan class="dim">      4.8ms</tspan>
  </text>

  <!-- Row 10: go A -->
  <text x="20" y="296" class="mono" font-size="12.5">
    <tspan class="pid">12349  </tspan>
    <tspan class="pname">go              </tspan>
    <tspan class="qtype">A      </tspan>
    <tspan class="host">sum.golang.org                           </tspan>
    <tspan class="dim">→ </tspan>
    <tspan class="ip">34.107.138.40</tspan>
    <tspan class="dim">     2.6ms</tspan>
  </text>

  <!-- Cursor blink line -->
  <text x="20" y="316" class="mono" font-size="12.5">
    <tspan class="pid">12350  </tspan>
    <tspan class="pname">pip             </tspan>
    <tspan class="qtype">A      </tspan>
    <tspan class="host">pypi.org</tspan>
  </text>
  <rect x="392" y="305" width="8" height="14" fill="#06b6d4" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom status bar -->
  <rect x="2" y="350" width="768" height="18" fill="#111827" rx="0"/>
  <rect x="2" y="350" width="768" height="18" fill="#111827"/>
  <rect x="2" y="350" width="768" height="20" rx="10" fill="#111827"/>
  <rect x="2" y="350" width="768" height="10" fill="#111827"/>
  <text x="20" y="363" class="mono" font-size="10" fill="#374151">● capturing  UDP:53  all interfaces  │  10 queries  │  CAP_NET_RAW</text>
  <circle cx="14" cy="359" r="3" fill="#4ade80">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Top border accent -->
  <rect x="2" y="2" width="768" height="2" rx="10" fill="#06b6d4" opacity="0.3"/>
</svg>
