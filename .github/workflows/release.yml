name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          for ARCH in amd64 arm64; do
            OUT="dist/proc-trace-dns-linux-${ARCH}"
            CGO_ENABLED=0 GOOS=linux GOARCH=${ARCH} go build \
              -trimpath \
              -ldflags="-s -w -extldflags=-static -X main.version=${VERSION}" \
              -o "${OUT}" .
            echo "Built: ${OUT} ($(du -sh "${OUT}" | cut -f1))"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  rpm:
    name: RHEL9 RPM
    needs: build
    runs-on: ubuntu-latest
    container:
      image: almalinux:9

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: dnf install -y golang rpm-build rpmdevtools

      - name: Build binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -extldflags=-static -X main.version=${VERSION}" \
            -o proc-trace-dns .

      - name: Build RPM
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          rpmdev-setuptree
          cp proc-trace-dns ~/rpmbuild/BUILD/

          cat > ~/rpmbuild/SPECS/proc-trace-dns.spec <<SPEC
          Name:           proc-trace-dns
          Version:        ${VERSION}
          Release:        1%{?dist}
          Summary:        Watch every DNS query your processes make in real time
          License:        MIT
          BuildArch:      x86_64

          %description
          proc-trace-dns captures DNS queries system-wide via a raw AF_PACKET socket
          and attributes each query to the process that made it.
          Requires root or CAP_NET_RAW.

          %install
          install -Dm755 %{_builddir}/proc-trace-dns %{buildroot}/usr/local/bin/proc-trace-dns

          %files
          /usr/local/bin/proc-trace-dns

          %changelog
          * $(date "+%a %b %d %Y") GitHub Actions <actions@github.com> - ${VERSION}-1
          - Release ${VERSION}
          SPEC

          rpmbuild -bb ~/rpmbuild/SPECS/proc-trace-dns.spec
          find ~/rpmbuild/RPMS -name '*.rpm' -exec cp {} . \;
          ls -lh *.rpm

      - name: Upload RPM to release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.rpm"
